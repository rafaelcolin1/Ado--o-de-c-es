<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adoção de cães</title>
</head>
<body>
    <h2>Formulários de Adoção</h2>

    <form>
        <label for="nome">Nome: </label>
        <input type="nome" id="nome" placeholder="Digite seu nome" minlength="3" required>
        <br>
        <label for="email">Email: </label>
        <input type="email" id="email" placeholder="Digite seu email">
        <br>
        <label for="cpf">CPF: </label>
        <input type="cpf" id="cpf" placeholder="Digite seu CPF">
        <br>
        <label for="idade">Idade: </label>
        <input type="idade" id="idade" placeholder="Digite sua idade" min="18" oninput="idademin">
        <br>
        <label for="cidade">Cidade: </label>
        <input type="cidade" id="cidade" placeholder="Digite sua Cidade">
        <br>
        <label for="animal">Qunatas horas o animal ficará soinho?</label>
        <input type="animal" id="animal" placeholder="Digite">
        <br>
        <label for="adocao">Motivo de adoção: </label>
        <input type="adocao" id="adocao" placeholder="Digite" minlength="10" required>
        <br>
        <label for="Moradia">Moradia: </label>
        <select name="Moradia" id="Moradia">
        <option value="">Selecione</option>
        <option value="Casa">Casa</option>
        <option value="Apartamento">Apartamento</option>
        </select>
        <br>
        <label for="quintal">Possui Quintal?</label>
        <input type="radio" name="quintal" value="sim">Sim
        <input type="radio" name="quintal" value="nao">Não
        <br>
        <label for="pet">Já teve pet antes?</label>
        <input type="radio" name="pet" value="sim">Sim
        <input type="radio" name="pet" value="nao">Não
        <br>
        <label for="pet">Aceita os termos de responsabilidade?</label>
        <input type="radio" name="Responsabilidade" value="sim">Sim
        <br>
        <button type="submit">Enviar</button>
    </form>
</body>
</html>
